<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بيت السلندر السوري</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==================== شاشة تسجيل الدخول ==================== -->
  <div id="loginScreen" class="screen active">
    <h1>⚙️ بيت السلندر</h1>
    <input type="text" id="username" placeholder="اسم المستخدم" />
    <input type="password" id="password" placeholder="كلمة المرور" />
    <button onclick="login()">دخول</button>
    <p id="loginError" style="color:red;"></p>
  </div>

  <!-- ==================== شاشة المدير ==================== -->
  <div id="adminScreen" class="screen">
    <h2>👑 لوحة المدير</h2>
    <nav>
      <button onclick="showAdminTab('stats')">📊 الإحصائيات</button>
      <button onclick="showAdminTab('addWorker')">👤 إضافة عامل</button>
      <button onclick="showAdminTab('addCylinder')">🆕 سلندر جديد</button>
      <button onclick="showAdminTab('cylinders')">📋 السلندرات</button>
      <button onclick="showAdminTab('messages')">📩 المراسلة</button>
      <button onclick="showAdminTab('settings')">⚙️ الإعدادات</button>
      <button onclick="logout()">🚪 خروج</button>
    </nav>

    <!-- تبويب الإحصائيات -->
    <div id="tab-stats" class="tab">
      <h3>إحصائيات اليوم</h3>
      <p>🟢 نشط: <span id="statActive">0</span></p>
      <p>🔴 مرفوض: <span id="statRejected">0</span></p>
      <p>✅ مسلَّم: <span id="statDelivered">0</span></p>
    </div>

    <!-- تبويب إضافة عامل -->
    <div id="tab-addWorker" class="tab" style="display:none;">
      <h3>إضافة عامل جديد</h3>
      <input type="text" id="newWorkerName" placeholder="اسم العامل" />
      <input type="password" id="newWorkerPass" placeholder="كلمة المرور" />
      <button onclick="addWorker()">إضافة</button>
      <p id="workerMsg"></p>
      <hr />
      <h3>قائمة العمال</h3>
      <ul id="workersList"></ul>
    </div>

    <!-- تبويب إضافة سلندر -->
    <div id="tab-addCylinder" class="tab" style="display:none;">
      <h3>إضافة سلندر جديد</h3>
      <select id="cylType">
        <option value="iron">حديد</option>
        <option value="chrome">كروم</option>
      </select>
      <input type="text" id="engravedCode" placeholder="الكود المنقوش" />
      <input type="text" id="clientName" placeholder="اسم المطبعة" />
      <input type="text" id="printType" placeholder="نوع الطبعة" />
      <input type="date" id="entryDate" />
      <input type="date" id="expectedDate" />
      <textarea id="notes" placeholder="ملاحظات"></textarea>
      <button onclick="addCylinder()">إضافة</button>
      <p id="cylMsg"></p>
    </div>

    <!-- تبويب جميع السلندرات -->
    <div id="tab-cylinders" class="tab" style="display:none;">
      <h3>جميع السلندرات</h3>
      <table id="cylTable">
        <thead>
          <tr>
            <th>الكود</th>
            <th>النوع</th>
            <th>المرحلة</th>
            <th>الحالة</th>
            <th>إجراء</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- تبويب المراسلة -->
    <div id="tab-messages" class="tab" style="display:none;">
      <h3>إرسال رسالة</h3>
      <select id="msgWorkerSelect"></select>
      <textarea id="msgText" placeholder="نص الرسالة"></textarea>
      <button onclick="sendMessage()">إرسال</button>
      <p id="msgStatus"></p>
    </div>

    <!-- تبويب الإعدادات -->
    <div id="tab-settings" class="tab" style="display:none;">
      <h3>تغيير كلمة المرور</h3>
      <input type="password" id="oldPass" placeholder="كلمة المرور القديمة" />
      <input type="password" id="newPass" placeholder="الجديدة" />
      <button onclick="changeAdminPass()">حفظ</button>
      <p id="settingsMsg"></p>
    </div>
  </div>

  <!-- ==================== شاشة العامل ==================== -->
  <div id="workerScreen" class="screen">
    <h2>👷 العامل</h2>
    <nav>
      <button onclick="showWorkerTab('process')">🔧 عمليتي</button>
      <button onclick="showWorkerTab('inbox')">📥 الرسائل</button>
      <button onclick="logout()">🚪 خروج</button>
    </nav>

    <!-- تبويب العملية -->
    <div id="tab-process" class="tab">
      <h3>المرحلة الحالية</h3>
      <div id="stepTracker"></div>
      <p id="currentStepText"></p>
      <button id="nextBtn" onclick="nextStep()">✅ إنجاز المرحلة</button>
      <button id="backBtn" onclick="prevStep()">⬅️ رجوع خطوة</button>
      <button id="rejectBtn" onclick="reportDefect()">⚠️ إبلاغ عن عيب</button>
      <div id="defectReasonDiv" style="display:none;">
        <textarea id="defectReason" placeholder="سبب الرفض"></textarea>
        <button onclick="confirmReject()">تأكيد الرفض</button>
      </div>
    </div>

    <!-- تبويب الرسائل -->
    <div id="tab-inbox" class="tab" style="display:none;">
      <h3>صندوق الرسائل</h3>
      <ul id="inboxList"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
