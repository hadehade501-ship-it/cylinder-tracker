<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيت السلندر السوري - النسخة الاحترافية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --blue: #1b3a6b;
    --gold: #c9a84c;
    --white: #ffffff;
    --success: #1a7a4a;
    --danger: #a01010;
    --text: #1a1a2e;
    --muted: #6b7a8d;
    --bg-light: #f4f7fa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cairo', sans-serif; background: var(--navy); color: var(--text); direction: rtl; }

  /* الشاشة الرئيسية */
  .container { max-width: 600px; margin: 0 auto; padding: 20px; }
  .card { background: var(--white); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .card-title { color: var(--blue); font-weight: 700; margin-bottom: 15px; border-bottom: 2px solid var(--gold); padding-bottom: 5px; }

  /* الحقول والأزرار */
  input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
  .btn-primary { background: var(--blue); color: white; }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-danger { background: var(--danger); color: white; }

  /* نظام الصفحات */
  .page { display: none; }
  .active { display: block; }

  /* ملفات العمال */
  .worker-file-item { background: #fff9e6; border-right: 4px solid var(--gold); padding: 10px; margin-bottom: 10px; border-radius: 4px; }
  .timestamp { font-size: 11px; color: var(--muted); display: block; }

  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--blue); color: white; padding: 10px 20px; border-radius: 30px; display: none; z-index: 1000; }
</style>
</head>
<body>

<div class="container">
  <div id="loginPage" class="page active">
    <div class="card" style="text-align: center;">
        <h2 style="color: var(--blue)">بيت السلندر السوري</h2>
        <p style="color: var(--gold)">نظام الإدارة المطور</p>
        <hr style="margin: 20px 0; opacity: 0.2;">
        <input type="text" id="loginName" placeholder="اسم المستخدم">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-primary" onclick="login('worker')">دخول عمال</button>
            <button class="btn btn-gold" onclick="login('manager')">دخول إدارة</button>
        </div>
    </div>
  </div>

  <div id="managerPage" class="page">
    <div class="card">
        <div class="card-title">⚙️ إعدادات الحماية</div>
        <label>كلمة مرور المدير</label>
        <input type="text" id="newMgrPass" placeholder="تغيير كلمة سر المدير">
        <label>كلمة مرور العمال</label>
        <input type="text" id="newWrkPass" placeholder="تغيير كلمة سر العمال">
        <button class="btn btn-primary" onclick="saveNewSettings()">حفظ الإعدادات</button>
    </div>

    <div class="card">
        <div class="card-title">📁 إدارة ملفات العمال</div>
        <input type="text" id="targetWorker" placeholder="اسم العامل (مثلاً: أحمد)">
        <textarea id="workerNote" placeholder="اكتب التعليمات أو الملف الخاص بهذا العامل..."></textarea>
        <button class="btn btn-gold" onclick="addWorkerNote()">إرسال للملف الشخصي</button>
    </div>
    <button class="btn btn-danger" onclick="logout()">تسجيل الخروج</button>
  </div>

  <div id="workerPage" class="page">
    <div class="card" id="personalFilesCard">
        <div class="card-title">📂 ملفاتي وتوجيهات الإدارة</div>
        <div id="workerFilesDisplay">لا توجد ملفات حالياً.</div>
    </div>
    <div class="card">
        <div class="card-title">🏭 تسجيل العمليات</div>
        <input type="text" placeholder="رقم السلندر">
        <select>
            <option>ديكروم (DK)</option>
            <option>بوليش (PL)</option>
            <option>نكل (NK)</option>
            <option>كروم (CR)</option>
        </select>
        <button class="btn btn-primary">تحديث الحالة</button>
    </div>
    <button class="btn btn-danger" onclick="logout()">تسجيل الخروج</button>
  </div>
</div>

<div id="toast"></div>

<script>
    // الحفاظ على البيانات في localStorage
    let settings = JSON.parse(localStorage.getItem('sch_settings')) || { mgrPass: "1234", wrkPass: "0000" };
    let workerData = JSON.parse(localStorage.getItem('sch_worker_data')) || {};
    let currentUser = "";

    function login(role) {
        const name = document.getElementById('loginName').value.trim();
        const pass = document.getElementById('loginPass').value.trim();

        if (role === 'manager') {
            if (pass === settings.mgrPass) {
                showPage('managerPage');
                showToast("أهلاً بك أيها المدير");
            } else { showToast("كلمة سر المدير خاطئة"); }
        } else {
            if (pass === settings.wrkPass && name !== "") {
                currentUser = name;
                showPage('workerPage');
                displayWorkerNotes();
                showToast("تم دخول العامل: " + name);
            } else { showToast("تأكد من الاسم وكلمة السر"); }
        }
    }

    function saveNewSettings() {
        const m = document.getElementById('newMgrPass').value;
        const w = document.getElementById('newWrkPass').value;
        if (m) settings.mgrPass = m;
        if (w) settings.wrkPass = w;
        localStorage.setItem('sch_settings', JSON.stringify(settings));
        showToast("✅ تم حفظ كلمات المرور الجديدة");
    }

    function addWorkerNote() {
        const name = document.getElementById('targetWorker').value.trim();
        const note = document.getElementById('workerNote').value.trim();
        if (!name || !note) return showToast("أكمل البيانات");

        if (!workerData[name]) workerData[name] = [];
        workerData[name].push({
            text: note,
            time: new Date().toLocaleString('ar-SY')
        });

        localStorage.setItem('sch_worker_data', JSON.stringify(workerData));
        showToast("✅ تمت إضافة الملف لـ " + name);
        document.getElementById('workerNote').value = "";
    }

    function displayWorkerNotes() {
        const container = document.getElementById('workerFilesDisplay');
        const notes = workerData[currentUser] || [];
        if (notes.length === 0) {
            container.innerHTML = "لا توجد تعليمات خاصة بك اليوم.";
            return;
        }
        container.innerHTML = notes.map(n => `
            <div class="worker-file-item">
                <p>${n.text}</p>
                <span class="timestamp">${n.time}</span>
            </div>
        `).join('');
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function logout() {
        showPage('loginPage');
        document.getElementById('loginPass').value = "";
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }
</script>

</body>
</html>
